<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Travel Bucket List | Login</title>
	<link rel="stylesheet" href="css/style.css" />
</head>
<body>
	<header class="site-header">
		<div class="container nav-wrap">
			<a class="brand" href="dashboard.html">Travel Bucket List</a>
			<nav class="site-nav">
				<a href="dashboard.html">Home</a>
				<a href="browse.html">Browse</a>
				<a href="bucketlist.html">My Bucket List</a>
				<a href="register.html">Register</a>
			</nav>
		</div>
	</header>

	<main class="container page-main">
		<section class="auth-card">
			<h1>Welcome back</h1>
			<p class="subtitle">Log in to manage your travel bucket list.</p>

			<form class="form-grid" id="loginForm" method="post" novalidate>
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" required />

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="••••••••" required />

				<button type="submit" class="btn btn-primary">Login</button>
			</form>
			<p id="authMessage" class="subtitle"></p>

			<p class="auth-link">New here? <a href="register.html">Create an account</a></p>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>Plan. Explore. Remember.</p>
		</div>
	</footer>
	<script src="js/nav.js" defer></script>
	<script src="js/auth.js" defer></script>
</body>
</html>
