<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Travel Bucket List | Register</title>
	<link rel="stylesheet" href="css/style.css" />
</head>
<body>
	<header class="site-header">
		<div class="container nav-wrap">
			<a class="brand" href="dashboard.html">Travel Bucket List</a>
			<nav class="site-nav">
				<a href="dashboard.html">Home</a>
				<a href="browse.html">Browse</a>
				<a href="bucketlist.html">My Bucket List</a>
				<a href="login.html">Login</a>
			</nav>
		</div>
	</header>

	<main class="container page-main">
		<section class="auth-card">
			<h1>Create your account</h1>
			<p class="subtitle">Register with your name, email, and password.</p>

			<form class="form-grid" id="registerForm" method="post" novalidate>
				<label for="name">Full name</label>
				<input id="name" name="name" type="text" placeholder="Alex Traveler" required />

				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" required />

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="Create a password" required />

				<button type="submit" class="btn btn-primary">Create account</button>
			</form>
			<p id="authMessage" class="subtitle"></p>

			<p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>Dream big. Travel often.</p>
		</div>
	</footer>
	<script src="js/nav.js" defer></script>
	<script src="js/auth.js" defer></script>
</body>
</html>
